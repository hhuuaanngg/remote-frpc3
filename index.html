<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frpc.toml Editor</title>
    <script>window.global = window;</script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      #splash {
        position: fixed; inset: 0; background: hsl(0 0% 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        z-index: 9999; transition: opacity 0.3s ease;
      }
      .dark #splash { background: hsl(220 15% 8%); }
      #splash.hidden { display: none !important; }
      #splash .spinner {
        width: 32px; height: 32px;
        border: 2px solid hsl(214 32% 91%); border-top-color: hsl(217 91% 60%);
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      .dark #splash .spinner {
        border-color: #30363d; border-top-color: #58a6ff;
      }
      #splash .title { color: hsl(222 47% 11%); font-family: system-ui, sans-serif; font-size: 14px; }
      .dark #splash .title { color: #c9d1d9; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      (function() {
        var stored = localStorage.getItem('frpc-editor-theme');
        var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="spinner"></div>
      <div class="title">frpc-editor</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
