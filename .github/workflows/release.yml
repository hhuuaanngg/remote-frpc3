name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $exe = "src-tauri/target/x86_64-pc-windows-msvc/release/frpc-editor.exe"
          if (!(Test-Path $exe)) {
            throw "Portable executable not found: $exe"
          }

          $portableZip = "$artifactDir/frpc-editor-windows-x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $portableZip -Force

          $msi = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" | Select-Object -First 1
          $nsis = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe" | Select-Object -First 1

          if ($null -eq $msi) { throw "MSI installer not found" }
          if ($null -eq $nsis) { throw "NSIS installer not found" }

          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "portable=$portableZip" >> $env:GITHUB_OUTPUT
          echo "msi=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "nsis=$($nsis.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frpc-editor-windows-x64
          path: |
            artifacts/frpc-editor-windows-x64-portable.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('dev-{0}', github.run_number) }}
          name: frpc-editor ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}-dev.{1}', steps.assets.outputs.version, github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.portable }}
            ${{ steps.assets.outputs.msi }}
            ${{ steps.assets.outputs.nsis }}
