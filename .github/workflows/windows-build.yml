name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Create portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $exe = "src-tauri/target/x86_64-pc-windows-msvc/release/frpc-editor.exe"
          if (!(Test-Path $exe)) {
            throw "Portable executable not found: $exe"
          }

          Compress-Archive `
            -Path $exe `
            -DestinationPath "$artifactDir/frpc-editor-windows-x64-portable.zip" `
            -Force

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: frpc-editor-windows-x64-portable
          path: artifacts/frpc-editor-windows-x64-portable.zip
          if-no-files-found: error

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: frpc-editor-windows-x64-installers
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
